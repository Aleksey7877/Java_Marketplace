syntax = "proto3";

package marketplace.user.v1;

option java_package =
    "com.github.aleksey7877.marketplace.contracts.user";

option java_multiple_files = true;

option java_outer_classname = "UserProto";


enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_BUYER = 1;
  USER_ROLE_SELLER = 2;
  USER_ROLE_ADMIN = 3;
}


service UserService {
  rpc GetUser(GetUserRequest)
      returns (GetUserResponse);
}


message GetUserRequest {
  int64 user_id = 1;
}


message GetUserResponse {
  int64 id = 1;
  string username = 2;
  string email = 3;
  UserRole role = 4;
}